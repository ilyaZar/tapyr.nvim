name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        neovim:
          - v0.10.4
          - stable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7
        with:
          version: ${{ matrix.neovim }}
          neovim: true
      - run: ./scripts/test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7
        with:
          version: stable
          neovim: true
      - name: Install coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes lua5.1 luarocks
          luarocks --lua-version=5.1 --tree "$RUNNER_TEMP/luarocks" \
            install luacov 0.17.0-1
          luarocks --lua-version=5.1 --tree "$RUNNER_TEMP/luarocks" \
            install luacov-reporter-lcov 0.2-0
      - name: Run coverage
        run: |
          eval "$(luarocks --lua-version=5.1 \
            --tree "$RUNNER_TEMP/luarocks" path)"
          ./scripts/coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 14
